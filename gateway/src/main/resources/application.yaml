server:
  port: 8080

spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/it-office-platform

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/employees/**
            - id: tenant-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/tenants/**
            - id: workspace-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/workspaces/**

management:
  endpoints:
    web:
      exposure:
        include: health,info